    StrategyMetrics:
      description: Aggregated metrics for a strategy across all tasks.
      example:
        tests_selected: 4
        true_negatives: 7
        tests_filtered: 7
        false_positives: 2
        total_tests: 2
        true_positives: 5
        false_negatives: 9
