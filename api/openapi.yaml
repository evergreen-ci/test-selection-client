        total_tests:
          title: Total Tests
          type: integer
        tests_selected:
          title: Tests Selected
          type: integer
        tests_filtered:
          title: Tests Filtered
          type: integer
      required:
      - strategy_name
      - tests_filtered
      - tests_selected
      - total_tests
      title: StrategyMetrics
    StrategyTestMetrics:
      description: Metrics for a specific test evaluated by a strategy.
      example:
        known_issues:
        - source: test_registry
          discovered_at: 2000-01-23T04:56:07.000+00:00
        - source: test_registry
          discovered_at: 2000-01-23T04:56:07.000+00:00
        subsequent_result: ""
        baseline_result: ""
        explanation: explanation
        classification: true_positive
        is_known_issue: true
        test_name: test_name
        strategy_name: null
        strategy_result: ""
        was_filtered: true
        expected_outcome: expected_outcome
      properties:
        test_name:
          title: Test Name
          type: string
        was_filtered:
          title: Was Filtered
          type: boolean
        strategy_name:
          $ref: "#/components/schemas/StrategyEnum"
        expected_outcome:
          title: Expected Outcome
          type: string
        explanation:
          title: Explanation
          type: string
        baseline_result:
          allOf:
          - $ref: "#/components/schemas/TestResult"
          nullable: true
        strategy_result:
          allOf:
          - $ref: "#/components/schemas/TestResult"
          nullable: true
        subsequent_result:
          allOf:
          - $ref: "#/components/schemas/TestResult"
          nullable: true
        classification:
          $ref: "#/components/schemas/TestClassification"
        known_issues:
          items:
            $ref: "#/components/schemas/KnownIssue"
          title: Known Issues
          type: array
        is_known_issue:
          title: Is Known Issue
          type: boolean
      required:
      - classification
      - expected_outcome
      - explanation
      - is_known_issue
      - strategy_name
      - test_name
      - was_filtered
      title: StrategyTestMetrics
    SuccessMeasure:
      description: |-
        This class is used to calculate the "magic number" that denotes the efficiency of a strategy

        The "magic numbers" are:
        1. How many tests were processed: total_number_of_tests
        2. What percentage of selected tests matched the expected outcome
            (number_of_correctly_selected_expected_outcome_passing_tests / number_of_selected_tests)
        3. What percentage of unselected tests matched the expected outcome
            (number_of_correctly_unselected_expected_outcome_passing_tests / number_of_unselected_tests)
        4. The overall success of the patch
            (number_of_correctly_selected_expected_outcome_passing_tests +
            number_of_correctly_unselected_expected_outcome_passing_tests)
            / total_number_of_tests
      properties:
        total_number_of_tests:
          default: 0
          title: Total Number Of Tests
          type: integer
        number_of_selected_tests:
          default: 0
          title: Number Of Selected Tests
          type: integer
        number_of_unselected_tests:
          default: 0
          title: Number Of Unselected Tests
          type: integer
        number_of_correctly_selected_expected_outcome_passing_tests:
          default: 0
          title: Number Of Correctly Selected Expected Outcome Passing Tests
          type: integer
        number_of_correctly_unselected_expected_outcome_passing_tests:
          default: 0
          title: Number Of Correctly Unselected Expected Outcome Passing Tests
          type: integer
        selected_without_filter:
          default: 0
          title: Selected Without Filter
          type: integer
        number_of_selected_unknown_expected_outcome_tests:
          default: 0
          title: Number Of Selected Unknown Expected Outcome Tests
          type: integer
        number_of_unselected_unknown_expected_outcome_tests:
          default: 0
          title: Number Of Unselected Unknown Expected Outcome Tests
          type: integer
      title: SuccessMeasure
