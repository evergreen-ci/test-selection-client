openapi: 3.1.0
info:
  description: "Test Selection services, owner: DevProd Services & Integrations team"
  title: Test Selection Services
  version: 1.0.0
servers:
- url: /
paths:
  /api/test_selection/select_tests/{project_id}/{requester}/{build_variant_name}/{task_id}/{task_name}/:
    post:
      description: |-
        Get the results of the default strategy.
        :param project_id: The project id.
        :param requester: The requester.
        :param build_variant_name: The build variant name.
        :param task_id: The task id.
        :param task_name: The task name.
        :param test_names: The test names.
        :param background_tasks: Background tasks to run after the request is completed.
        :param strategies: The set of strategies to use
        :return: A set of strings representing the names of tests
                 that should run for the specified task based on the selected strategies.
      operationId: select_tests_api_test_selection_select_tests__project_id___requester___build_variant_name___task_id___task_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: requester
        required: true
        schema:
          title: Requester
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: false
        in: path
        name: task_id
        required: true
        schema:
          title: Task Id
          type: string
        style: simple
      - explode: false
        in: path
        name: task_name
        required: true
        schema:
          title: Task Name
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Body_select_tests_api_test_selection_select_tests__project_id___requester___build_variant_name___task_id___task_name___post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  nullable: true
                  type: string
                title: Response Select Tests Api Test Selection Select Tests  Project
                  Id   Requester   Build Variant Name   Task Id   Task Name   Post
                type: array
                uniqueItems: true
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Select Tests
      tags:
      - test_selection
  /api/test_selection/select_known_tests/{project_id}/{requester}/{build_variant_name}/{task_id}/{task_name}/:
    post:
      description: |-
        Get the results of the default strategy for known tests of a task.
        :param project_id: The project id.
        :param requester: The requester.
        :param build_variant_name: The build variant name.
        :param task_id: The task id.
        :param task_name: The task name.
        :param background_tasks: Background tasks to run after the request is completed.
        :param strategies: The set of strategies to use
        :return: A set of strings representing the names of known tests
                 that should run for the specified task based on the selected strategies.
      operationId: select_all_known_tests_of_a_task_api_test_selection_select_known_tests__project_id___requester___build_variant_name___task_id___task_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: requester
        required: true
        schema:
          title: Requester
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: false
        in: path
        name: task_id
        required: true
        schema:
          title: Task Id
          type: string
        style: simple
      - explode: false
        in: path
        name: task_name
        required: true
        schema:
          title: Task Name
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              default:
              - Optimistic
              items:
                $ref: "#/components/schemas/StrategyEnum"
              title: Strategies
              type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  nullable: true
                  type: string
                title: Response Select All Known Tests Of A Task Api Test Selection
                  Select Known Tests  Project Id   Requester   Build Variant Name   Task
                  Id   Task Name   Post
                type: array
                uniqueItems: true
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Select All Known Tests Of A Task
      tags:
      - test_selection
  /api/test_selection/explain_tests/{project_id}/{requester}/{build_variant_name}/{task_id}/{task_name}/:
    post:
      description: |-
        Get the results of the default strategy as well as the explanation.
        :param project_id: The project id.
        :param requester: The requester.
        :param build_variant_name: The build variant name.
        :param task_id: The task id.
        :param task_name: The task name.
        :param test_names: The test names.
        :param background_tasks: Background tasks to run after the request is completed.
        :param strategies: The set of strategies to use
        :return: A mapping from {Build variant x task x test} to a
                 full explanation of the reasons behind the test selection
      operationId: explain_select_tests_api_test_selection_explain_tests__project_id___requester___build_variant_name___task_id___task_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: requester
        required: true
        schema:
          title: Requester
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: false
        in: path
        name: task_id
        required: true
        schema:
          title: Task Id
          type: string
        style: simple
      - explode: false
        in: path
        name: task_name
        required: true
        schema:
          title: Task Name
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Body_explain_select_tests_api_test_selection_explain_tests__project_id___requester___build_variant_name___task_id___task_name___post"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  additionalProperties:
                    $ref: "#/components/schemas/Explanation"
                title: Response Explain Select Tests Api Test Selection Explain Tests  Project
                  Id   Requester   Build Variant Name   Task Id   Task Name   Post
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Explain Select Tests
      tags:
      - test_selection
  /api/test_selection/transition_tests/{project_id}/{build_variant_name}/{task_name}/:
    post:
      description: |-
        Transition a single test into or out of the "Manually Quarantined" state.
        If that test doesn't exist in the registry, the registry will create an entry for it.
        :param project_id: The project id.
        :param build_variant_name: The build variant name.
        :param task_name: The task name.
        :param test_names: The test names to be transitioned.
        :param is_manually_quarantined: Denote if the test should be marked manually quarantined or not
        :return: None
      operationId: mark_tests_as_manually_quarantined_api_test_selection_transition_tests__project_id___build_variant_name___task_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: false
        in: path
        name: task_name
        required: true
        schema:
          title: Task Name
          type: string
        style: simple
      - explode: true
        in: query
        name: is_manually_quarantined
        required: true
        schema:
          title: Is Manually Quarantined
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              items:
                nullable: true
                type: string
              title: Test Names
              type: array
              uniqueItems: true
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Mark Tests As Manually Quarantined
      tags:
      - state_transition
  /api/test_selection/transition_task/{project_id}/{build_variant_name}/{task_name}/:
    post:
      description: |-
        Transition all known tests of a single task into or out of the "Manually Quarantined" state
        :param project_id: The project id.
        :param build_variant_name: The build variant name.
        :param task_name: The task name.
        :param is_manually_quarantined: Denote if the task should be marked manually quarantined
        :return: None
      operationId: mark_task_as_manually_quarantined_api_test_selection_transition_task__project_id___build_variant_name___task_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: false
        in: path
        name: task_name
        required: true
        schema:
          title: Task Name
          type: string
        style: simple
      - explode: true
        in: query
        name: is_manually_quarantined
        required: true
        schema:
          title: Is Manually Quarantined
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Mark Task As Manually Quarantined
      tags:
      - state_transition
  /api/test_selection/transition_variant/{project_id}/{build_variant_name}/:
    post:
      description: |-
        Transition all known tests of a single variant into or out of the "Manually Quarantined" state
        :param project_id: The project id.
        :param build_variant_name: The build variant name.
        :param is_manually_quarantined: Denote if the variant should be marked manually quarantined
        :return: None
      operationId: mark_variant_as_manually_quarantined_api_test_selection_transition_variant__project_id___build_variant_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: true
        in: query
        name: is_manually_quarantined
        required: true
        schema:
          title: Is Manually Quarantined
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Mark Variant As Manually Quarantined
      tags:
      - state_transition
  /api/test_selection/get_tests_state/{project_id}/{build_variant_name}/{task_name}/:
    post:
      description: |-
        Return the state of a single test
        :param project_id: The project id.
        :param build_variant_name: The build variant name.
        :param task_name: The task name.
        :param test_names: The test names to be transitioned.
        :return: None
      operationId: get_tests_state_api_test_selection_get_tests_state__project_id___build_variant_name___task_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      - explode: false
        in: path
        name: task_name
        required: true
        schema:
          title: Task Name
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              title: Test Names
              type: array
              uniqueItems: true
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: "#/components/schemas/TestStateInfo"
                title: Response Get Tests State Api Test Selection Get Tests State  Project
                  Id   Build Variant Name   Task Name   Post
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Tests State
      tags:
      - state_transition
  /api/test_selection/get_variant_state/{project_id}/{build_variant_name}/:
    post:
      description: |-
        Return the state of all known tests of a single variant
        :param project_id: The project id.
        :param build_variant_name: The build variant name.
        :return: None
      operationId: get_variant_state_api_test_selection_get_variant_state__project_id___build_variant_name___post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      - explode: false
        in: path
        name: build_variant_name
        required: true
        schema:
          title: Build Variant Name
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: "#/components/schemas/TaskStateInfo"
                title: Response Get Variant State Api Test Selection Get Variant State  Project
                  Id   Build Variant Name   Post
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Variant State
      tags:
      - state_transition
  /api/test_selection/patch_scanner/{project_id}:
    post:
      description: |-
        Run over all patches of the last day in a project
        :param project_id: The project id.
        :param strategies: The set of strategies to use
        :return: None
      operationId: scan_patches_api_test_selection_patch_scanner__project_id__post
      parameters:
      - explode: false
        in: path
        name: project_id
        required: true
        schema:
          title: Project Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              default:
              - Optimistic
              items:
                $ref: "#/components/schemas/StrategyEnum"
              title: Strategies
              type: array
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Scan Patches
      tags:
      - patch_scanner_initiation
  /api/test_selection/single_patch_scanner/{patch_id}:
    post:
      description: |-
        Run over all patches of the last day in a project
        :param patch_id: The patch id.
        :param strategies: The set of strategies to use
        :return: None
      operationId: scan_single_patch_api_test_selection_single_patch_scanner__patch_id__post
      parameters:
      - explode: false
        in: path
        name: patch_id
        required: true
        schema:
          title: Patch Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              default:
              - Optimistic
              items:
                $ref: "#/components/schemas/StrategyEnum"
              title: Strategies
              type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                - $ref: "#/components/schemas/PatchExplanation"
                nullable: true
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Scan Single Patch
      tags:
      - patch_scanner_initiation
  /api/baseline/status:
    get:
      description: |-
        Get a baseline comparison by task ID or comparison ID.

        Provide exactly one of task_id or comparison_id as a query parameter.

        :param task_id: Optional Evergreen task ID
        :param comparison_id: Optional baseline comparison UUID
        :return: BaselineComparison model with full comparison data
        :raises HTTPException: 400 if neither or both IDs provided, 404 if no comparison found
      operationId: get_baseline_status_api_baseline_status_get
      parameters:
      - description: Evergreen task ID
        explode: true
        in: query
        name: task_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Baseline comparison UUID
        explode: true
        in: query
        name: comparison_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaselineComparison"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Baseline Status
      tags:
      - baseline
